name: Validate skill

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: sudo apt-get update && sudo apt-get install --yes jq ripgrep
      - run: bash scripts/validate-structure.sh
      - run: bash tests/evidence-gate-v1.sh
